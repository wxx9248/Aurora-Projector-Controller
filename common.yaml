# common.yaml — shared config for all build variants.
# Do NOT flash this file directly. It is pulled into the entrypoint files
# (aurora-projector.yaml, aurora-projector-ha.yaml) via `packages:`.
# Entrypoint files may override any substitution below (e.g. `name`).

substitutions:
  name: "aurora-projector"
  friendly_name: "Aurora Projector"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

# ESP32-C3 Super Mini (RISC-V) -> board: esp32-c3-devkitm-1
esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging (view with: esphome logs <entrypoint>.yaml).
# The C3 Super Mini has no USB-UART chip — it logs over the chip's built-in
# USB Serial/JTAG, so route the logger there (otherwise USB logs are silent).
logger:
  hardware_uart: USB_SERIAL_JTAG

# Over-the-air updates (after the first USB flash, you can update wirelessly)
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  id: wifi_id
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # ESP32-C3 Super Mini fix: the board browns out at full 20 dBm TX power during
  # the auth handshake, causing 'Auth Expired' disconnects. Lower TX power and
  # disable power-save for a stable connection.
  output_power: 8.5dB
  power_save_mode: none

  # Fallback hotspot (captive portal) if WiFi connection fails
  ap:
    ssid: ${friendly_name}
    password: !secret ap_password

captive_portal:

# === Aurora Projector hardware ===

# --- PWM outputs (ESP32 LEDC) ---
output:
  # RGB LED channels (transistor-driven)
  - platform: ledc
    pin: GPIO0
    id: led_red
    frequency: 1000 Hz
  - platform: ledc
    pin: GPIO1
    id: led_green
    frequency: 1000 Hz
  - platform: ledc
    pin: GPIO3
    id: led_blue
    frequency: 1000 Hz

  # Motor driver transistor (on/off). For variable speed, switch this to a
  # `ledc` output + a `fan` (speed slider) instead.
  - platform: gpio
    pin: GPIO4
    id: motor_output

  # Onboard status LED (C3 Super Mini blue LED on GPIO8, active-low) —
  # driven automatically by the status interval below
  - platform: gpio
    pin:
      number: GPIO8
      inverted: true
    id: onboard_led_output

# --- RGB color light (color picker on the web UI) ---
light:
  - platform: rgb
    name: "Projector LEDs"
    red: led_red
    green: led_green
    blue: led_blue

# --- Switches ---
switch:
  - platform: output
    name: "Motor"
    output: motor_output

# Restart button, handy for remote reboots
button:
  - platform: restart
    name: "Restart"

# Diagnostics
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"

# --- Onboard LED system-status indicator (GPIO8) ---
# Runs every 100 ms and picks a blink pattern from the WiFi state:
#   solid on   = WiFi connected
#   slow blink = connecting / disconnected (trying to reach the router)
#   fast blink = fallback AP mode (router unreachable, hotspot active)
interval:
  - interval: 100ms
    then:
      - lambda: |-
          static uint32_t tick = 0;
          tick++;
          bool on;
          if (id(wifi_id).is_connected()) {
            on = true;                    // solid: connected
          } else if (id(wifi_id).is_ap_active()) {
            on = (tick % 2) == 0;         // fast blink (~5 Hz): AP fallback
          } else {
            on = (tick % 10) < 5;         // slow blink (1 Hz): connecting
          }
          if (on) id(onboard_led_output).turn_on();
          else    id(onboard_led_output).turn_off();
