# secrets.example.yaml - template. Copy to secrets.yaml and fill in real values.
#   cp secrets.example.yaml secrets.yaml
# Referenced from configs via !secret <key>

# --- WiFi ---
wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# --- Home Assistant native API encryption key (base64, 32 bytes) ---
# Generate with: openssl rand -base64 32
# Paste this same key into Home Assistant when it adopts the device.
api_encryption_key: "GENERATE_A_32_BYTE_BASE64_KEY"

# --- OTA (over-the-air update) password ---
# Generate with: openssl rand -hex 16
ota_password: "CHANGE_ME"

# --- Fallback hotspot password (used if WiFi fails) ---
ap_password: "CHANGE_ME"
